name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate diff
        run: git diff origin/${{ github.base_ref }}...HEAD > pr.diff

      - name: Analyse with GPT-4o mini
        env:
          GITHUB_TOKEN: ${{ secrets.MODELS_TOKEN }}
        run: |
          python3 - <<'EOF'
          import json, os, sys, urllib.request, urllib.error

          with open('pr.diff', 'r', errors='replace') as f:
              diff = f.read(14000)

          if not diff.strip():
              json.dump({"summary": "No changes to review.", "comments": []}, open('review.json', 'w'))
              sys.exit(0)

          payload = {
              "model": "gpt-4o-mini",
              "response_format": {"type": "json_object"},
              "temperature": 0.2,
              "max_tokens": 2000,
              "messages": [
                  {
                      "role": "system",
                      "content": (
                          "You are a senior Java and Spring Boot engineer performing a thorough code review. "
                          "Respond ONLY with a valid JSON object matching this schema exactly:\n"
                          "{\n"
                          '  "summary": "<overall assessment in markdown>",\n'
                          '  "comments": [\n'
                          '    { "path": "<exact relative file path from diff>", "line": <integer>, "body": "<issue and suggestion>" }\n'
                          "  ]\n"
                          "}\n\n"
                          "Rules:\n"
                          "- path must match exactly the file path shown after +++ in the diff (strip the b/ prefix).\n"
                          "- line must be a line number that appears in the diff hunk (a line starting with + or a context line).\n"
                          "- Flag any security issues, bugs, missing @Transactional, N+1 queries, or exposed sensitive data.\n"
                          "- Only add comments for real issues, not style preferences.\n"
                          "- If everything looks good, say so in the summary and leave comments empty."
                      )
                  },
                  {
                      "role": "user",
                      "content": f"Review this PR diff:\n\n```diff\n{diff}\n```"
                  }
              ]
          }

          req = urllib.request.Request(
              "https://models.inference.ai.azure.com/chat/completions",
              data=json.dumps(payload).encode(),
              headers={
                  "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                  "Content-Type": "application/json"
              }
          )

          try:
              with urllib.request.urlopen(req, timeout=60) as resp:
                  data = json.loads(resp.read())
          except urllib.error.HTTPError as e:
              print(f"GitHub Models error {e.code}: {e.read().decode()}", file=sys.stderr)
              sys.exit(1)

          review = json.loads(data['choices'][0]['message']['content'])
          print(json.dumps(review, indent=2))

          with open('review.json', 'w') as f:
              json.dump(review, f)
          EOF

      - name: Post review and inline comments
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'EOF'
          import json, os, sys, urllib.request, urllib.error

          with open('review.json') as f:
              review = json.load(f)

          token   = os.environ['GH_TOKEN']
          repo    = os.environ['REPO']
          pr      = os.environ['PR_NUMBER']
          sha     = os.environ['COMMIT_SHA']
          base    = f"https://api.github.com/repos/{repo}"
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "Content-Type": "application/json"
          }

          def api(url, payload):
              req = urllib.request.Request(url, data=json.dumps(payload).encode(), headers=headers)
              try:
                  with urllib.request.urlopen(req) as resp:
                      return json.loads(resp.read()), None
              except urllib.error.HTTPError as e:
                  return None, f"{e.code}: {e.read().decode()}"

          summary  = review.get('summary', '')
          comments = review.get('comments', [])

          # Post overall review as a comment (never blocks merge on its own)
          body = f"## 🤖 AI Code Review\n\n{summary}\n\n---\n*Powered by GPT-4o mini via [GitHub Models](https://github.com/marketplace/models)*"
          _, err = api(f"{base}/pulls/{pr}/reviews", {"commit_id": sha, "body": body, "event": "COMMENT"})
          if err:
              print(f"Failed to post review: {err}", file=sys.stderr)

          # Post each issue as an inline comment (becomes a conversation on the PR)
          for c in comments:
              payload = {
                  "body": c.get('body', ''),
                  "commit_id": sha,
                  "path": c.get('path', ''),
                  "line": c.get('line', 1),
                  "side": "RIGHT"
              }
              _, err = api(f"{base}/pulls/{pr}/comments", payload)
              if err:
                  print(f"  Skipped {c.get('path')}:{c.get('line')} — {err}", file=sys.stderr)
              else:
                  print(f"  ✓ {c.get('path')}:{c.get('line')}")
          EOF
